<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Access Your Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
  <style>
    body { background: #050709; display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; }
    .auth-card { background: var(--secondary-color); padding: 50px; border-radius: 20px; width: 95%; max-width: 450px; border: 1px solid rgba(201, 169, 110, 0.1); }
    .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(201, 169, 110, 0.2); }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }
    .auth-link {
      transition: color 0.25s ease, text-shadow 0.25s ease, text-decoration-color 0.25s ease;
    }
    .auth-link:hover {
      color: var(--accent-hover) !important;
      text-decoration: underline;
      text-underline-offset: 0.2em;
      text-decoration-color: currentColor;
      text-shadow: 0 0 10px rgba(201, 169, 110, 0.25);
    }
    .auth-card .form-control,
    .auth-card .form-select {
      color: var(--text-primary);
      -webkit-text-fill-color: var(--text-primary);
    }
    .auth-card .form-control::placeholder {
      color: rgba(255, 255, 255, 0.28);
      opacity: 1;
    }
    [data-theme="light"] .auth-card .form-control::placeholder {
      color: rgba(11, 15, 20, 0.35);
    }
    .auth-card .form-control:-webkit-autofill,
    .auth-card .form-control:-webkit-autofill:hover,
    .auth-card .form-control:-webkit-autofill:focus {
      -webkit-text-fill-color: var(--text-primary);
      transition: background-color 9999s ease-in-out 0s;
    }
    /* Mobile: Card Look */
    @media (max-width: 767px) {
      body { align-items: center; padding: 20px !important; }
      .auth-card { 
        width: 100%; 
        max-width: 100%; 
        min-height: auto; 
        border-radius: 20px; 
        border: 1px solid rgba(201, 169, 110, 0.2); 
        padding: 40px 25px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .position-absolute.top-0.end-0 { z-index: 1000; }
    }
    
    /* Tablet & Web: Portrait Card */
    @media (min-width: 768px) {
      .auth-card { width: 95%; }
    }
  </style>
</head>
<body>
  <div class="position-absolute top-0 end-0 p-4">
    <button id="themeToggle" class="theme-toggle"><i class="bi bi-sun-fill"></i></button>
  </div>

  <div class="auth-card reveal">
    <div class="text-center mb-5">
      <a class="navbar-brand mb-4 d-flex justify-content-center" href="index.html">
        <img src="assets/images/logo.svg" alt="Logo" class="brand-logo me-2">
        SHADOW<span class="brand-text">QUEST</span>
      </a>
      <p class="text-secondary mt-3">Enter your credentials to access the vault.</p>
    </div>
    <form action="dashboard.html">
      <div class="mb-3">
        <label class="form-label text-secondary small">Case ID or Email</label>
        <input type="text" class="form-control" placeholder="SQ-XXXX" required>
      </div>
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-baseline">
          <label class="form-label text-secondary small">Security PassKey</label>
          <a href="#" class="accent-text small auth-link">Forgot PassKey?</a>
        </div>
        <input type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-accent w-100 mb-3">Login to Dashboard</button>
      
      <div class="divider text-secondary small uppercase">OR</div>

      <div class="row g-2 mb-4">
        <div class="col-6">
          <button type="button" class="btn btn-outline-accent w-100 btn-sm py-2"><i class="bi bi-google me-2"></i> Google</button>
        </div>
        <div class="col-6">
          <button type="button" class="btn btn-outline-accent w-100 btn-sm py-2"><i class="bi bi-twitter-x me-2"></i> Twitter</button>
        </div>
      </div>

      <div class="text-center">
        <span class="text-secondary small">Unauthorized access is monitored.</span>
        <div class="mt-4"><a href="register.html" class="accent-text small auth-link">Request New Access Code</a></div>
      </div>
    </form>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
