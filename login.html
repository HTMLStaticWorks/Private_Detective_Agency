<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Veritas Investigations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* ===== Login Page — Tablet Fix (768px–1024px) ===== */
        @media (min-width: 768px) and (max-width: 1024px) {
            /* Remove wasted navbar spacing — auth pages have no navbar */
            body.auth-page {
                padding-top: 0 !important;
            }
            /* Force container to fill the viewport width properly */
            body.auth-page > .container {
                width: 100vw !important;
                max-width: 100vw !important;
                padding-left: 2rem !important;
                padding-right: 2rem !important;
            }
            /* Card: explicit sizing, centered, not full-screen */
            body.auth-page .login-card {
                max-width: 520px !important;
                min-width: 420px !important;
                width: 85% !important;
                margin: 0 auto !important;
                padding: 3rem 3rem !important;
            }
        }
    </style>
</head>
<body class="auth-page d-flex align-items-center justify-content-center vh-100 position-relative">

    <!-- Top Right Controls -->
    <div class="position-absolute top-0 end-0 p-4 d-flex gap-2" style="z-index: 1000;">
        <button class="btn btn-sm btn-dark rounded-circle" id="dark-mode-toggle" title="Toggle Theme" style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="btn btn-sm btn-outline-premium px-3" id="rtl-toggle">RTL</button>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12 col-lg-4 login-card-wrapper">
                <div class="p-5 border-0 rounded-4 shadow-lg dark-card login-card">
                    <!-- Brand Inside Card -->
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand text-dark fs-3 text-decoration-none fw-bold" style="color: var(--secondary-color) !important;">
                            <i class="bi bi-shield-lock me-2"></i>VERITAS
                        </a>
                    </div>
                    
                    <h4 class="text-center mb-4 fw-bold">Login</h4>
                    
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" class="form-control px-3" placeholder="" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control px-3 password-input" id="password" required>
                                <span class="input-group-text input-group-text-custom toggle-password" data-target="password">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                            <div class="text-end mt-1">
                                <a href="#" class="small text-decoration-none" style="color: var(--secondary-color);">Forgot Password?</a>
                            </div>
                        </div>
                        
                        <div class="mb-4 d-flex align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-premium w-100 mb-4 py-2">Login</button>
                        
                        <!-- Social Login -->
                        <div class="text-center mb-4">
                            <p class="small text-muted mb-3">Or login with</p>
                            <div class="d-flex justify-content-center gap-3">
                                <a href="#" class="btn btn-outline-dark rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;"><i class="bi bi-google"></i></a>
                                <a href="#" class="btn btn-outline-dark rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;"><i class="bi bi-facebook"></i></a>
                                <a href="#" class="btn btn-outline-dark rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;"><i class="bi bi-apple"></i></a>
                            </div>
                        </div>

                        <div class="text-center">
                            <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="fw-bold text-decoration-none" style="color: var(--secondary-color);">Signup</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
